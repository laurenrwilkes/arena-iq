  body { background: var(--bg); }

  .games-container { max-width: 880px; margin: 0 auto; padding: 56px 24px; }

  .game-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; }
  .game-card {
    background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);

  .game-card:hover, .game-card:focus-visible { border-color: rgba(139,92,246,0.4); background: var(--glass-bg-strong); transform: translateY(-2px); }

  .game-card-name { font-weight: 800; font-size: 1.05rem; margin-bottom: 6px; }
  .game-card-sub { font-size: 0.85rem; color: var(--t2); line-height: 1.6; margin-bottom: 12px; }

  .game-tag { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; padding: 3px 9px; border-radius: 100px; background: rgba(139,92,246,0.15); color: var(--purple-l, #a78bfa); }
  .game-card.coming-soon { opacity: 0.5; cursor: default; }
  .game-card.coming-soon:hover { transform: none; border-color: var(--glass-border); background: var(--glass-bg); }

  /* MENTAL MATH GAME */
  .mm-setup { max-width: 640px; margin: 0 auto; padding: 56px 24px; text-align: center; }
  .mm-setup h1 { margin-bottom: 12px; }
  .mm-setup p { color: var(--t2); font-size: 0.95rem; line-height: 1.7; margin-bottom: 28px; }
  .mm-rules { text-align: left; background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 20px 24px; margin-bottom: 28px; }
  .mm-rules li { color: var(--t2); font-size: 0.88rem; line-height: 1.9; }
  .mm-topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 24px; background: var(--card); border-bottom: 1px solid var(--border);
  }
  .mm-progress { font-size: 0.85rem; font-weight: 700; color: var(--t2); font-variant-numeric: tabular-nums; }
  .mm-timer { font-size: 1.6rem; font-weight: 900; font-variant-numeric: tabular-nums; line-height: 1; }
  .mm-timer.low { color: var(--red); }
  .mm-score { font-size: 0.85rem; font-weight: 700; color: var(--green); font-variant-numeric: tabular-nums; }
  .mm-game-area {
    min-height: calc(100vh - 64px - 54px);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 40px 24px; gap: 28px;
  }
  .mm-question { font-size: 3rem; font-weight: 800; font-family: 'JetBrains Mono', monospace; letter-spacing: 1px; text-align: center; }
  .mm-input-row { display: flex; gap: 10px; align-items: center; }
  .mm-input {
    width: 220px; padding: 16px 18px; font-size: 1.6rem; font-weight: 700;
    background: var(--card); border: 2px solid var(--border); border-radius: var(--r);
    color: var(--t1); outline: none; text-align: center; font-family: 'JetBrains Mono', monospace;
    transition: border-color 0.2s;
  }
  .mm-input:focus { border-color: var(--purple); }
  .mm-input.flash-correct { border-color: var(--green); background: rgba(16,185,129,0.08); }
  .mm-input.flash-wrong { border-color: var(--red); background: rgba(239,68,68,0.08); }
  .mm-hint { font-size: 0.78rem; color: var(--t3); }

  /* RESULT */
  .mm-result { max-width: 640px; margin: 0 auto; padding: 56px 24px; text-align: center; }
  .mm-result-score { font-size: 4rem; font-weight: 900; font-family: 'JetBrains Mono', monospace; margin: 12px 0; }
  .mm-result-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 28px 0; }
  .mm-stat { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 16px 10px; }
  .mm-stat-value { font-size: 1.4rem; font-weight: 800; font-family: 'JetBrains Mono', monospace; }
  .mm-stat-label { font-size: 0.72rem; color: var(--t3); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }
  .mm-result-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

<script>
function toggleProfileMenu() {
  const menu = document.getElementById('profile-menu');
  if (!menu) return;
  const open = menu.style.display !== 'block';
  menu.style.display = open ? 'block' : 'none';
  document.getElementById('nav-username')?.setAttribute('aria-expanded', String(open));
}
document.addEventListener('click', e => {
  const wrap = document.getElementById('nav-profile-wrap');
  if (wrap && !wrap.contains(e.target)) {
    const menu = document.getElementById('profile-menu');
    if (menu) menu.style.display = 'none';
    document.getElementById('nav-username')?.setAttribute('aria-expanded', 'false');
  }
});
</script>
