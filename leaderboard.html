<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Leaderboard — ArenaIQ</title>
<link rel="stylesheet" href="style.css" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  .lb-page { max-width: 900px; margin: 0 auto; padding: 100px 40px 60px; }
  .lb-full-table { background: var(--card); border: 1px solid var(--border); border-radius: var(--r2); overflow: hidden; }
  .lb-full-row {
    display: grid; grid-template-columns: 52px 1fr 110px 80px 80px 70px;
    align-items: center; gap: 12px; padding: 14px 24px;
    border-bottom: 1px solid var(--border); transition: background 0.15s;
  }
  .lb-full-row:last-child { border-bottom: none; }
  .lb-full-row:hover { background: var(--card2); }
  .lb-head { background: var(--card2) !important; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--t3); cursor: default; }
  .lb-head:hover { background: var(--card2) !important; }
  .lb-avatar-sm { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.9rem; flex-shrink: 0; }
  .lb-player-sm { display: flex; align-items: center; gap: 10px; }
  .lb-name-sm { font-weight: 600; font-size: 0.9rem; }
  .lb-sub-sm { font-size: 0.75rem; color: var(--t3); }
  .search-input { padding: 9px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--card); color: var(--t1); font-size: 0.85rem; outline: none; width: 220px; transition: border-color 0.2s; }
  .search-input:focus { border-color: var(--purple); }
  .search-input::placeholder { color: var(--t3); }
  .top-podium { display: grid; grid-template-columns: 1fr 1.1fr 1fr; gap: 16px; margin-bottom: 32px; align-items: end; }
  .podium-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r2); padding: 20px; text-align: center; }
  .podium-card.first { border-color: rgba(245,158,11,0.4); background: rgba(245,158,11,0.05); padding: 28px 20px; }
  .p-crown { font-size: 1.8rem; margin-bottom: 6px; }
  .p-av { width: 52px; height: 52px; border-radius: 50%; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; font-weight: 800; }
  .podium-card.first .p-av { width: 64px; height: 64px; font-size: 1.6rem; }
  .p-name { font-weight: 700; font-size: 0.95rem; }
  .p-elo { font-size: 1.4rem; font-weight: 900; margin: 4px 0; }
  .podium-card.first .p-elo { font-size: 1.8rem; }
  .p-wins { font-size: 0.75rem; color: var(--t3); }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--t3); }
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">
    <div class="logo-icon">⚔️</div>
    <span>ArenaIQ</span>
  </a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="play.html">Play</a>
    <a href="leaderboard.html" style="color:var(--t1)">Leaderboard</a>
  </div>
  <div class="nav-actions">
    <a href="play.html" class="btn btn-primary">⚔️ Play Now</a>
  </div>
</nav>

<div class="lb-page">
  <div style="margin-bottom:40px">
    <div class="section-tag">Rankings</div>
    <h2>Global Leaderboard</h2>
    <p style="color:var(--t2);margin-top:8px">Live ELO rankings. Updated after every match.</p>
  </div>

  <div id="podium-section" style="display:none">
    <div class="top-podium" id="podium"></div>
  </div>

  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:12px">
    <div style="font-size:0.85rem;color:var(--t3)" id="player-count">Loading...</div>
    <input type="text" class="search-input" placeholder="🔍 Search player..." oninput="filterSearch(this.value)" />
  </div>

  <div class="lb-full-table" id="lb-table">
    <div class="lb-full-row lb-head">
      <div>#</div><div>Player</div><div>ELO</div><div style="text-align:center">Wins</div><div style="text-align:center">Win %</div><div style="text-align:right">Matches</div>
    </div>
    <div class="empty-state">Loading leaderboard...</div>
  </div>
</div>

<script>
const API = 'http://localhost:3001';
let allPlayers = [];
let filtered = [];

const COLORS = [
  'linear-gradient(135deg,#f59e0b,#ef4444)',
  'linear-gradient(135deg,#7c3aed,#06b6d4)',
  'linear-gradient(135deg,#10b981,#06b6d4)',
  'linear-gradient(135deg,#f97316,#f59e0b)',
  'linear-gradient(135deg,#06b6d4,#10b981)',
  'linear-gradient(135deg,#a78bfa,#7c3aed)',
  'linear-gradient(135deg,#ef4444,#f97316)',
  'linear-gradient(135deg,#6ee7b7,#10b981)',
];

async function loadLeaderboard() {
  try {
    const res = await fetch(`${API}/api/leaderboard`);
    if (!res.ok) throw new Error();
    allPlayers = await res.json();
    filtered = allPlayers;
    renderPodium();
    renderTable();
    document.getElementById('player-count').textContent = `${allPlayers.length} ranked players`;
  } catch {
    document.getElementById('lb-table').innerHTML = `
      <div class="lb-full-row lb-head"><div>#</div><div>Player</div><div>ELO</div><div style="text-align:center">Wins</div><div style="text-align:center">Win %</div><div style="text-align:right">Matches</div></div>
      <div class="empty-state">⚠️ Could not connect to server.<br><small>Make sure the server is running: <code>node server/index.js</code></small></div>`;
    document.getElementById('player-count').textContent = 'Server offline';
  }
}

function renderPodium() {
  if (allPlayers.length < 3) return;
  const [first, second, third] = allPlayers;
  const podiumSection = document.getElementById('podium-section');
  const podium = document.getElementById('podium');
  podiumSection.style.display = 'block';

  function card(p, rank, extraClass) {
    const color = COLORS[p.id % COLORS.length];
    const medals = ['🥇','🥈','🥉'];
    const eloColors = ['var(--gold)','#c0c0c0','#cd7f32'];
    return `
    <div class="podium-card ${extraClass}">
      <div class="p-crown">${medals[rank]}</div>
      <div class="p-av" style="background:${color}">${p.username.charAt(0).toUpperCase()}</div>
      <div class="p-name">${p.username}</div>
      <div class="p-elo" style="color:${eloColors[rank]}">${p.elo.toLocaleString()}</div>
      <div class="p-wins">${p.wins} wins · ${p.win_rate ?? 0}% WR</div>
    </div>`;
  }

  podium.innerHTML = `
    ${card(second, 1, '')}
    ${card(first, 0, 'first')}
    ${card(third, 2, '')}`;
}

function renderTable() {
  const table = document.getElementById('lb-table');
  const head = `<div class="lb-full-row lb-head"><div>#</div><div>Player</div><div>ELO</div><div style="text-align:center">Wins</div><div style="text-align:center">Win %</div><div style="text-align:right">Matches</div></div>`;

  if (filtered.length === 0) {
    table.innerHTML = head + '<div class="empty-state">No players found.</div>';
    return;
  }

  const rows = filtered.map((p, i) => {
    const rank = i + 1;
    const rankDisp = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : rank;
    const color = COLORS[p.id % COLORS.length];
    const eloColor = rank === 1 ? 'var(--gold)' : rank === 2 ? '#c0c0c0' : rank === 3 ? '#cd7f32' : 'var(--purple-l)';
    const total = p.wins + p.losses + p.draws;
    return `
    <div class="lb-full-row ${rank <= 3 ? 'top3' : ''}">
      <div class="lb-rank" style="font-size:${rank<=3?'1.1rem':'0.85rem'};text-align:center">${rankDisp}</div>
      <div class="lb-player-sm">
        <div class="lb-avatar-sm" style="background:${color}">${p.username.charAt(0).toUpperCase()}</div>
        <div><div class="lb-name-sm">${p.username}</div><div class="lb-sub-sm">${total} matches</div></div>
      </div>
      <div style="font-size:1rem;font-weight:800;color:${eloColor}">${p.elo.toLocaleString()}</div>
      <div style="font-size:0.85rem;color:var(--t2);text-align:center">${p.wins}</div>
      <div style="font-size:0.85rem;color:var(--t2);text-align:center">${p.win_rate ?? 0}%</div>
      <div style="font-size:0.82rem;color:var(--t3);text-align:right">${total}</div>
    </div>`;
  }).join('');

  table.innerHTML = head + rows;
}

function filterSearch(val) {
  filtered = val
    ? allPlayers.filter(p => p.username.toLowerCase().includes(val.toLowerCase()))
    : allPlayers;
  renderTable();
}

loadLeaderboard();
</script>
</body>
</html>
