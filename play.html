<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Play — ArenaIQ</title>
<link rel="stylesheet" href="style.css" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap');

  body { background: var(--bg); }
  #app { min-height: calc(100vh - 64px); padding-top: 64px; }

  /* SETUP */
  .setup-container { max-width: 760px; margin: 0 auto; padding: 56px 24px; }
  .setup-header { margin-bottom: 44px; }
  .setup-step { margin-bottom: 32px; }
  .step-label { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--t3); margin-bottom: 12px; }
  .option-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
  .option-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--r); padding: 18px; cursor: pointer;
    transition: all 0.2s; text-align: center;
  }
  .option-card:hover { border-color: rgba(124,58,237,0.4); background: var(--card2); }
  .option-card.selected {
    border-color: var(--purple);
    background: rgba(124,58,237,0.1);
    box-shadow: 0 0 0 1px var(--purple), 0 0 20px rgba(124,58,237,0.12);
  }
  .opt-icon { font-size: 1.8rem; margin-bottom: 8px; }
  .opt-name { font-weight: 700; font-size: 0.92rem; margin-bottom: 4px; }
  .opt-sub { font-size: 0.75rem; color: var(--t3); }

  /* MATCHMAKING */
  .matchmaking-container {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: calc(100vh - 64px); padding: 40px; text-align: center;
  }
  .mm-spinner {
    width: 56px; height: 56px;
    border: 3px solid var(--border); border-top-color: var(--purple);
    border-radius: 50%; animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* GAME */
  .game-container { display: flex; flex-direction: column; height: calc(100vh - 64px); }
  .game-topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 24px; background: var(--card); border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .game-info { display: flex; gap: 8px; }
  .info-pill { padding: 4px 12px; border-radius: 100px; font-size: 0.75rem; font-weight: 700; border: 1px solid; }
  .game-timer-wrap { text-align: center; }
  .game-timer { font-size: 1.6rem; font-weight: 900; font-variant-numeric: tabular-nums; line-height: 1; }
  .game-players-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 24px; background: var(--bg2); border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .player-you, .player-opp { display: flex; align-items: center; gap: 10px; }
  .p-avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.9rem; flex-shrink: 0; }
  .p-name { font-size: 0.85rem; font-weight: 600; }

  /* CODE GAME — simple scrolling layout, no overflow traps */
  .game-container { display: flex; flex-direction: column; min-height: calc(100vh - 64px); }
  .game-body { display: grid; grid-template-columns: 1fr 1fr; flex: 1; }
  .game-left { padding: 20px 24px; overflow-y: auto; border-right: 1px solid var(--border); max-height: calc(100vh - 130px); }
  .game-right { display: flex; flex-direction: column; padding: 0; }
  .problem-title { font-size: 1.2rem; font-weight: 800; margin-bottom: 12px; }
  .problem-desc { font-size: 0.88rem; color: var(--t2); line-height: 1.8; margin-bottom: 20px; }
  .problem-section-label { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--t3); margin: 16px 0 8px; }
  .example-block { background: var(--card2); border-radius: 8px; padding: 12px 16px; margin-bottom: 10px; font-size: 0.83rem; }
  .ex-row { display: flex; gap: 8px; margin-bottom: 4px; align-items: flex-start; }
  .ex-row:last-child { margin-bottom: 0; }
  .ex-label { color: var(--t3); font-weight: 600; flex-shrink: 0; min-width: 80px; }
  .ex-row code { background: rgba(124,58,237,0.15); padding: 1px 6px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; color: var(--purple-l); }
  .constraints-list { padding-left: 18px; font-size: 0.82rem; color: var(--t2); line-height: 1.8; }
  .editor-topbar { display: flex; align-items: center; justify-content: space-between; padding: 8px 14px; background: var(--card2); border-bottom: 1px solid var(--border); }
  .lang-picker { display: flex; gap: 4px; }
  .lang-btn { padding: 3px 10px; border-radius: 4px; font-size: 0.72rem; font-weight: 700; border: 1px solid var(--border); background: transparent; color: var(--t3); cursor: pointer; transition: all 0.15s; letter-spacing: 0.3px; }
  .lang-btn:hover { color: var(--t1); border-color: var(--border2); }
  .lang-btn.active { background: rgba(124,58,237,0.2); border-color: var(--purple); color: var(--purple-l); }
  .code-editor {
    width: 100%; height: 320px; resize: vertical;
    background: #080814; border: none; outline: none;
    color: #c9d1d9; font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace;
    font-size: 13px; line-height: 1.65; padding: 14px 16px; tab-size: 2; display: block;
  }
  .code-editor:focus { background: #06060f; outline: none; }
  .test-output {
    background: #080814; border-top: 1px solid var(--border);
    padding: 10px 14px; font-size: 0.8rem; font-family: monospace;
    max-height: 180px; overflow-y: auto; flex-shrink: 0;
  }
  .tc-row { padding: 4px 0; line-height: 1.6; }
  .tc-pass { color: var(--green); }
  .tc-fail { color: var(--red); }
  .tc-error { color: var(--orange); }
  .tc-label { color: var(--t3); margin: 0 6px; }
  .tc-detail { display: block; padding-left: 20px; color: var(--t3); font-size: 0.75rem; }
  .tc-detail code { color: var(--purple-l); }
  .tc-summary { margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); font-weight: 600; color: var(--t2); }
  .tc-all-pass { color: var(--green); }
  .editor-actions { display: flex; gap: 8px; padding: 10px 14px; border-top: 1px solid var(--border); flex-shrink: 0; }
  .feedback-ok { color: var(--green); padding: 8px 14px; background: rgba(16,185,129,0.1); border-radius: 6px; }
  .feedback-wrong { color: var(--red); padding: 8px 14px; background: rgba(239,68,68,0.08); border-radius: 6px; }

  /* NUMERIC GAME */
  .numeric-game-area {
    flex: 1; overflow-y: auto; padding: 40px 24px;
    display: flex; flex-direction: column; align-items: center; gap: 24px;
  }
  .numeric-problem { max-width: 680px; width: 100%; }
  .numeric-desc { font-size: 0.95rem; color: var(--t2); line-height: 1.9; white-space: pre-line; }
  .numeric-answer-box {
    max-width: 480px; width: 100%;
    background: var(--card); border: 1px solid var(--border); border-radius: var(--r2); padding: 28px;
  }
  .answer-label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--t3); margin-bottom: 12px; }
  .answer-input-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .answer-prefix { font-size: 1.5rem; font-weight: 700; color: var(--green); }
  .answer-suffix { font-size: 1.1rem; font-weight: 600; color: var(--t2); }
  .answer-input {
    flex: 1; padding: 14px 16px; font-size: 1.4rem; font-weight: 700;
    background: var(--bg); border: 2px solid var(--border); border-radius: var(--r);
    color: var(--t1); outline: none; text-align: center; font-family: 'JetBrains Mono', monospace;
    transition: border-color 0.2s;
  }
  .answer-input:focus { border-color: var(--purple); }
  .numeric-actions { display: flex; gap: 10px; margin-top: 12px; }
  .steps-details {
    max-width: 680px; width: 100%;
    background: var(--card); border: 1px solid var(--border); border-radius: var(--r);
    padding: 0;
  }
  .steps-details summary { padding: 14px 18px; cursor: pointer; font-size: 0.88rem; font-weight: 600; color: var(--t2); user-select: none; }
  .steps-details summary:hover { color: var(--t1); }
  .steps-body { padding: 8px 18px 16px; border-top: 1px solid var(--border); }
  .step-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 0.85rem; gap: 16px; }
  .step-row:last-child { border-bottom: none; }
  .step-label { color: var(--t3); }
  .step-value { color: var(--t1); font-weight: 600; text-align: right; font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; }

  /* RESULT */
  .result-container { max-width: 900px; margin: 0 auto; padding: 48px 24px; }
  .result-banner { text-align: center; padding: 40px; border-radius: var(--r2); margin-bottom: 28px; border: 1px solid; }
  .result-banner.win { background: rgba(16,185,129,0.08); border-color: rgba(16,185,129,0.3); }
  .result-banner.loss { background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.3); }
  .result-banner.draw { background: rgba(245,158,11,0.08); border-color: rgba(245,158,11,0.3); }
  .result-icon { font-size: 3.5rem; margin-bottom: 10px; }
  .elo-change { display: inline-block; margin-top: 14px; font-size: 1.8rem; font-weight: 900; padding: 6px 24px; border-radius: var(--r); }
  .elo-change.pos { background: rgba(16,185,129,0.15); color: var(--green); }
  .elo-change.neg { background: rgba(239,68,68,0.15); color: var(--red); }
  .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
  .result-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r2); padding: 24px; }
  .summary-row { display: flex; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 0.88rem; color: var(--t2); }
  .summary-row:last-child { border-bottom: none; }
  .result-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

  @media (max-width: 640px) {
    .result-grid { grid-template-columns: 1fr; }
    .game-players-bar { flex-direction: column; gap: 8px; }
  }
</style>
<script>window.__SENTRY_DSN__ = 'https://7759a09b911029a3b03db100273fa56f@o4511330884714496.ingest.us.sentry.io/4511330890809344';</script>
<script src="sentry.js"></script>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <div class="logo-icon">⚔️</div>
    <span>ArenaIQ</span>
  </a>
  <div class="nav-links">
    <a href="index.html">Practice</a>
    <a href="play.html" style="color:var(--t1);font-weight:700">Battle</a>
  </div>
  <div class="nav-actions">
    <button id="nav-login" class="btn btn-ghost" style="font-size:0.85rem;padding:8px 16px"
      onclick="showAuthModal(user => { currentUser = user; updateNavUser(); })">Log In / Sign Up</button>
    <div style="position:relative" id="nav-profile-wrap">
      <div id="nav-username" style="width:34px;height:34px;border-radius:50%;background:var(--grad);display:none;align-items:center;justify-content:center;font-weight:700;font-size:0.9rem;cursor:pointer" onclick="toggleProfileMenu()">?</div>
      <div id="profile-menu" style="display:none;position:absolute;top:44px;right:0;background:var(--card);border:1px solid var(--border);border-radius:var(--r);min-width:180px;box-shadow:var(--shadow);z-index:200;overflow:hidden">
        <div id="profile-menu-user" style="padding:12px 16px;border-bottom:1px solid var(--border);font-size:0.85rem">
          <div style="font-weight:700" id="profile-menu-name">—</div>
          <div style="color:var(--t3);font-size:0.75rem" id="profile-menu-elo">— ELO</div>
        </div>
        <div style="border-top:1px solid var(--border)">
          <a href="#" onclick="Auth.logout()" style="display:block;padding:10px 16px;color:var(--red);text-decoration:none;font-size:0.88rem" onmouseover="this.style.background='var(--card2)'" onmouseout="this.style.background=''">Log Out</a>
        </div>
      </div>
    </div>
  </div>
</nav>

<script>
function toggleProfileMenu() {
  const menu = document.getElementById('profile-menu');
  if (!menu) return;
  const open = menu.style.display === 'block';
  menu.style.display = open ? 'none' : 'block';
}
document.addEventListener('click', e => {
  const wrap = document.getElementById('nav-profile-wrap');
  if (wrap && !wrap.contains(e.target)) {
    const menu = document.getElementById('profile-menu');
    if (menu) menu.style.display = 'none';
  }
});
</script>

<div id="server-warn" style="display:none;background:rgba(245,158,11,0.12);border-bottom:1px solid rgba(245,158,11,0.3);padding:8px 24px;font-size:0.82rem;color:var(--gold);align-items:center;gap:10px">
  ⚠️ Can't reach server — you can still play vs bot. Start the server with <code style="background:rgba(0,0,0,0.3);padding:2px 8px;border-radius:4px">./start.sh</code> for ranked play.
</div>

<div id="app"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="auth.js"></script>
<script src="game.js"></script>
</body>
</html>
