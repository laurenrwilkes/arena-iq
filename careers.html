<style>

  body { background: var(--bg); }
  #app { min-height: calc(100vh - 64px); }

  .cr-layout { display: grid; grid-template-columns: 320px 1fr; gap: 24px; max-width: 1280px; margin: 0 auto; padding: 28px 24px 56px; align-items: start; }
  .cr-header { grid-column: 1 / -1; margin-bottom: 8px; }

  .cr-view-tabs { display: flex; gap: 8px; max-width: 1280px; margin: 20px auto 0; padding: 0 24px; }

  /* PROFILE PANEL */
  .cr-profile {
    position: sticky; top: 84px;
    background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
    border: 1px solid var(--glass-border); border-radius: var(--r2); padding: 22px;
  }
  .cr-field { margin-bottom: 16px; }
  .cr-label { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--t3); margin-bottom: 7px; display: block; }
  .cr-input, .cr-select {
    width: 100%; padding: 10px 12px; font-size: 0.88rem; font-weight: 600;

  .cr-input:focus, .cr-select:focus { border-color: var(--purple); }
  .cr-grad-preview { font-size: 0.78rem; color: var(--purple-l); margin-top: 6px; font-weight: 600; }
  .cr-toggle-row { display: flex; gap: 8px; }

  .cr-toggle-btn.active { background: rgba(139,92,246,0.18); border-color: var(--purple); color: var(--purple-l); }
  .cr-profile-note { font-size: 0.78rem; color: var(--t3); line-height: 1.6; margin-top: 4px; }

  /* DASHBOARD */
  .cr-dash-top { margin-bottom: 16px; }
  .cr-search { position: relative; margin-bottom: 12px; }
  .cr-search input {
    width: 100%; padding: 12px 16px; font-size: 0.9rem; font-weight: 600;
    background: var(--card); border: 1px solid var(--border); border-radius: var(--r);

  .cr-search input:focus { border-color: var(--purple); }
  .cr-tag-row { display: flex; gap: 8px; flex-wrap: wrap; }

  .cr-tag-btn:hover { color: var(--t1); border-color: var(--border2); }
  .cr-tag-btn.active { background: rgba(139,92,246,0.18); border-color: var(--purple); color: var(--purple-l); }
  .cr-tag-btn.phd.active { background: rgba(239,68,68,0.16); border-color: var(--red); color: #fca5a5; }
  .cr-count { font-size: 0.8rem; color: var(--t3); margin: 14px 2px 12px; }

  /* JOB CARDS */

  .cr-backdrop {

  .cr-slideover {
    position: fixed; top: 0; right: 0; height: 100vh; width: min(520px, 100vw);

    transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.16,1,0.3,1);

  .cr-slideover-close {

  .cr-add-custom .cr-input { flex: 1; min-width: 160px; }

  .cr-board { display: grid; grid-template-columns: repeat(5, minmax(220px, 1fr)); gap: 14px; overflow-x: auto; padding-bottom: 8px; }
  .cr-board-col { background: var(--card2); border-radius: var(--r2); padding: 14px; min-height: 120px; }
  .cr-board-col-header { font-size: 0.78rem; font-weight: 800; color: var(--t2); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
  .cr-board-col-count { margin-left: auto; background: var(--card); border-radius: 100px; padding: 1px 8px; font-size: 0.7rem; color: var(--t3); }
  .cr-board-empty { text-align: center; color: var(--t3); font-size: 0.78rem; padding: 20px 0; }
  .cr-app-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); margin-bottom: 10px; overflow: hidden; }
  .cr-app-card.expanded { border-color: var(--purple); }
  .cr-app-card-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; padding: 12px 14px; cursor: pointer; }
  .cr-app-company { font-weight: 800; font-size: 0.85rem; }
  .cr-app-role { font-size: 0.76rem; color: var(--t2); margin-top: 2px; }
  .cr-app-round { display: inline-block; margin-top: 6px; font-size: 0.64rem; font-weight: 700; padding: 2px 8px; border-radius: 100px; background: rgba(139,92,246,0.15); color: var(--purple-l); }
  .cr-app-chevron { color: var(--t3); font-size: 0.7rem; flex-shrink: 0; margin-top: 3px; }
  .cr-app-card-body { padding: 0 14px 14px; border-top: 1px solid var(--border); }
  .cr-app-row { margin: 12px 0; }
  .cr-notes {
    width: 100%; min-height: 70px; padding: 10px 12px; font-size: 0.82rem; box-sizing: border-box;
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--t1);
    outline: none; resize: vertical; font-family: inherit; transition: border-color 0.15s;
  }
  .cr-notes:focus { border-color: var(--purple); }
  .cr-notes-updated { font-size: 0.7rem; color: var(--t3); margin-top: 6px; }
  .cr-remove-btn {
    width: 100%; margin-top: 6px; padding: 8px; border-radius: 8px; border: 1px solid rgba(239,68,68,0.3);
    background: rgba(239,68,68,0.08); color: #fca5a5; font-size: 0.76rem; font-weight: 700; cursor: pointer; transition: background 0.15s;
  }
  .cr-remove-btn:hover { background: rgba(239,68,68,0.16); }

  @media (max-width: 900px) {

  }
</style>

<script>
function toggleProfileMenu() {
  const menu = document.getElementById('profile-menu');
  if (!menu) return;
  const open = menu.style.display !== 'block';
  menu.style.display = open ? 'block' : 'none';
  document.getElementById('nav-username')?.setAttribute('aria-expanded', String(open));
}
document.addEventListener('click', e => {
  const wrap = document.getElementById('nav-profile-wrap');
  if (wrap && !wrap.contains(e.target)) {
    const menu = document.getElementById('profile-menu');
    if (menu) menu.style.display = 'none';
    document.getElementById('nav-username')?.setAttribute('aria-expanded', 'false');
  }
});
</script>
