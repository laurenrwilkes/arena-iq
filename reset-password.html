<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex,follow" />

<title>Reset Your Password | QuantBattle</title>
<link rel="canonical" href="https://www.quantbattle.net/reset-password.html" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" />
<link rel="stylesheet" href="style.css" />
<style>
  .reset-wrap { min-height: calc(100vh - 64px); display: flex; align-items: center; justify-content: center; padding: 24px; }
  .reset-box { background: var(--glass-bg-strong); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); border-radius: var(--r2); padding: 36px; width: 100%; max-width: 420px; box-shadow: var(--shadow), var(--glow); }
  .reset-box h1 { font-size: 1.4rem; margin-bottom: 8px; }
  .reset-box p.sub { font-size: 0.85rem; color: var(--t2); margin-bottom: 24px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--t2); margin-bottom: 6px; }
  .form-group input { width: 100%; padding: 10px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--r); color: var(--t1); font-size: 0.9rem; outline: none; transition: border-color 0.2s; }
  .form-group input:focus { border-color: var(--purple); }
  .reset-error { color: var(--red); font-size: 0.82rem; margin-bottom: 12px; min-height: 18px; }
  .reset-success { color: var(--green); font-size: 0.9rem; line-height: 1.5; }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M4 4l16 16M20 4L4 20"/>
        <path d="M4 4l3.2.6M20 4l-3.2.6M4 20l3.2-.6M20 20l-3.2-.6"/>
      </svg>
    </div>
    <span>QuantBattle</span>
  </a>
  <div class="nav-links">
    <a href="index.html">Questions</a>
    <a href="play.html">Battle</a>
    <a href="games.html">Games</a>
    <a href="careers.html">Jobs</a>
  </div>
  <div class="nav-actions"></div>
</nav>

<div class="reset-wrap">
  <div class="reset-box" id="reset-box">
    <h1>Reset your password</h1>
    <p class="sub" id="reset-sub">Enter a new password for your account.</p>

    <div id="reset-form">
      <div class="form-group">
        <label>New password</label>
        <input type="password" id="reset-password" placeholder="6+ characters" />
      </div>
      <div class="form-group">
        <label>Confirm password</label>
        <input type="password" id="reset-password-confirm" placeholder="6+ characters" />
      </div>
      <div class="reset-error" id="reset-error"></div>
      <button id="reset-btn" type="button" class="btn btn-primary" style="width:100%;justify-content:center" onclick="submitReset()">Reset Password →</button>
    </div>

    <div id="reset-invalid" style="display:none">
      <p class="reset-error" style="margin-bottom:16px">This reset link is missing, invalid, or has expired.</p>
      <a href="index.html" class="btn btn-ghost" style="width:100%;justify-content:center">Back to home</a>
    </div>

    <div id="reset-done" style="display:none">
      <p class="reset-success">Your password has been reset. You can now log in.</p>
      <a href="index.html" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:16px">Go to log in →</a>
    </div>
  </div>
</div>

<script>
  const API = window.location.origin;
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');

  if (!token) {
    document.getElementById('reset-form').style.display = 'none';
    document.getElementById('reset-sub').style.display = 'none';
    document.getElementById('reset-invalid').style.display = 'block';
  }

  async function submitReset() {
    const password = document.getElementById('reset-password').value;
    const confirm = document.getElementById('reset-password-confirm').value;
    const errorEl = document.getElementById('reset-error');
    errorEl.textContent = '';

    if (!password || password.length < 6) { errorEl.textContent = 'Password must be at least 6 characters.'; return; }
    if (password !== confirm) { errorEl.textContent = 'Passwords do not match.'; return; }

    const btn = document.getElementById('reset-btn');
    btn.disabled = true;
    btn.textContent = 'Resetting...';

    try {
      const res = await fetch(`${API}/api/reset-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, password }),
      });
      const data = await res.json();
      if (!res.ok) {
        errorEl.textContent = data.error || 'Something went wrong.';
        btn.disabled = false;
        btn.textContent = 'Reset Password →';
        return;
      }
      document.getElementById('reset-form').style.display = 'none';
      document.getElementById('reset-sub').style.display = 'none';
      document.getElementById('reset-done').style.display = 'block';
    } catch (e) {
      errorEl.textContent = 'Network error. Please try again.';
      btn.disabled = false;
      btn.textContent = 'Reset Password →';
    }
  }

  document.getElementById('reset-password-confirm')?.addEventListener('keydown', e => {
    if (e.key === 'Enter') submitReset();
  });
</script>

</body>
</html>
